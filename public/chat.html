<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>retr0 room</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="page-chat">
  <main class="chat-wrap">
    <header class="chat-top panel">
      <img class="brand-small" src="/retr0.svg" alt="retr0" />
      <div class="identity">
        <span>you:</span>
        <strong id="who">...</strong>
      </div>
      <div class="online-pill" id="online-pill" aria-live="polite">
        <span class="online-dot" id="online-dot" aria-hidden="true"></span>
        <span><strong id="online-count">0</strong> online</span>
      </div>
      <form action="/api/logout" method="post">
        <button type="submit">logout</button>
      </form>
    </header>

    <section class="panel chat-panel">
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="send-form" class="send-row">
        <div class="input-wrap">
          <input id="message-input" maxlength="300" autocomplete="off" placeholder="say something" required />
          <div id="mention-list" class="mention-list" role="listbox" aria-label="Online users"></div>
        </div>
        <button type="submit">send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <a class="footer-link" href="https://github.com/Nagul08">
      <span>Made in rush by</span>
      <img class="footer-logo" src="/retr0.svg" alt="retr0" />
    </a>
  </footer>

  <script src="/client.js"></script>
</body>
</html>
